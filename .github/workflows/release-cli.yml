name: CLI Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.3.1 (no 'cli-v' prefix)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  ci:
    name: Run CLI CI
    uses: ./.github/workflows/ci-cli.yml

  build:
    name: Bump, Build & Release (macOS universal)
    needs: ci
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        run: |
          sed -i.bak "s/^version = .*/version = \"${{ inputs.version }}\"/" cli/Cargo.toml
          rm -f cli/Cargo.toml.bak
          cargo check --manifest-path cli/Cargo.toml --quiet
          grep "^version" cli/Cargo.toml

      - name: Commit, tag, and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add cli/Cargo.toml cli/Cargo.lock
          git commit -m "chore(cli): bump version to ${{ inputs.version }}"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push rejected (attempt $i), fetching and rebasing..."
            git fetch origin main
            git rebase origin/main
            sleep $((RANDOM % 4 + 1))
          done

          git tag "cli-v${{ inputs.version }}"
          git push origin "cli-v${{ inputs.version }}"

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --manifest-path cli/Cargo.toml

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build (arm64)
        run: cargo build --release --target aarch64-apple-darwin --manifest-path cli/Cargo.toml

      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin --manifest-path cli/Cargo.toml

      - name: Create universal binary
        run: |
          lipo -create -output porchlight \
            cli/target/aarch64-apple-darwin/release/porchlight \
            cli/target/x86_64-apple-darwin/release/porchlight
          chmod +x porchlight
          file porchlight
          lipo -info porchlight

      - name: Package
        run: |
          ARCHIVE="porchlight-macos-universal-${{ inputs.version }}.tar.gz"
          tar -czf "$ARCHIVE" porchlight
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "cli-v${{ inputs.version }}" \
            "$ARCHIVE" "$ARCHIVE.sha256" \
            --title "CLI v${{ inputs.version }}" \
            --generate-notes \
            --repo "${{ github.repository }}"
