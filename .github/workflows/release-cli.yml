name: CLI Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload (macOS universal)
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' cli/Cargo.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build (arm64)
        run: cargo build --release --target aarch64-apple-darwin --manifest-path cli/Cargo.toml

      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin --manifest-path cli/Cargo.toml

      - name: Create universal binary
        run: |
          lipo -create -output porchlight \
            cli/target/aarch64-apple-darwin/release/porchlight \
            cli/target/x86_64-apple-darwin/release/porchlight
          chmod +x porchlight
          file porchlight
          lipo -info porchlight

      - name: Package
        run: |
          ARCHIVE="porchlight-macos-universal-${{ steps.version.outputs.version }}.tar.gz"
          tar -czf "$ARCHIVE" porchlight
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "$ARCHIVE" "$ARCHIVE.sha256" --clobber --repo "${{ github.repository }}"
