name: macOS App Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Trigger & Wait for Xcode Cloud
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Trigger Xcode Cloud build
        env:
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_WORKFLOW_ID: "5F690A2E-9269-47A8-8F18-F07A414AF0C7" # GitHub Deploy
          # Safe to build the tag directly now: prepare-release.yml bumps the
          # version and commits it to main BEFORE tagging, so the tag and
          # main's HEAD point at the exact same commit at release time (no
          # more separate bump-after-checkout step here that could diverge).
          ASC_TAG: ${{ github.ref_name }}
        run: |
          pip install --quiet cryptography
          python3 .github/scripts/trigger_xcode_cloud_build.py
