name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: Rust CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        working-directory: cli
        run: cargo fmt --check

      - name: Run tests
        working-directory: cli
        run: cargo test -j 1

  macos:
    name: macOS App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run macOS tests
        working-directory: apps/macos
        run: xcodebuild test -project "Porchlight.xcodeproj" -scheme "Porchlight" -configuration Debug -destination "platform=macOS"
