name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (no 'v' prefix)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Bump, tag, and create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update Cargo.toml version
        run: |
          sed -i.bak 's/^version = .*/version = "${{ inputs.version }}"/' cli/Cargo.toml
          rm -f cli/Cargo.toml.bak
          grep "^version" cli/Cargo.toml

      - name: Update macOS app version in Xcode project
        run: |
          # Update both Debug and Release configurations
          sed -i 's/MARKETING_VERSION = [0-9.]*;/MARKETING_VERSION = ${{ inputs.version }};/g' apps/macos/Porchlight.xcodeproj/project.pbxproj
          grep "MARKETING_VERSION" apps/macos/Porchlight.xcodeproj/project.pbxproj | head -2

      - name: Commit, tag, and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add cli/Cargo.toml apps/macos/Porchlight.xcodeproj/project.pbxproj
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" --title "v${{ inputs.version }}" --generate-notes --repo "${{ github.repository }}"
