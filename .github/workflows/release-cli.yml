name: CLI Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload (macOS universal)
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Update Cargo.toml version
        run: |
          sed -i.bak 's/^version = .*/version = "${{ steps.version.outputs.version }}"/' cli/Cargo.toml
          rm -f cli/Cargo.toml.bak
          grep "^version" cli/Cargo.toml

      - name: Commit and push version bump
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add cli/Cargo.toml
          git commit -m "chore(cli): bump version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push rejected (attempt $i), fetching and rebasing..."
            git fetch origin main
            git rebase origin/main
            sleep $((RANDOM % 4 + 1))
          done

      - name: Install Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build (arm64)
        run: cargo build --release --target aarch64-apple-darwin --manifest-path cli/Cargo.toml

      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin --manifest-path cli/Cargo.toml

      - name: Create universal binary
        run: |
          lipo -create -output porchlight \
            cli/target/aarch64-apple-darwin/release/porchlight \
            cli/target/x86_64-apple-darwin/release/porchlight
          chmod +x porchlight
          file porchlight
          lipo -info porchlight

      - name: Package
        run: |
          ARCHIVE="porchlight-macos-universal-${{ steps.version.outputs.version }}.tar.gz"
          tar -czf "$ARCHIVE" porchlight
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" "$ARCHIVE" "$ARCHIVE.sha256" --clobber --repo "${{ github.repository }}"
