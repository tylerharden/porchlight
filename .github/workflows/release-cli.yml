name: CLI Release

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        required: true
        type: string
        default: main
      version:
        required: true
        type: string
      tag:
        required: true
        type: string

jobs:
  build:
    name: Build & Upload (macOS universal)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build (arm64)
        run: cargo build --release --target aarch64-apple-darwin --manifest-path cli/Cargo.toml

      - name: Build (x86_64)
        run: cargo build --release --target x86_64-apple-darwin --manifest-path cli/Cargo.toml

      - name: Create universal binary
        run: |
          lipo -create -output porchlight \
            cli/target/aarch64-apple-darwin/release/porchlight \
            cli/target/x86_64-apple-darwin/release/porchlight
          chmod +x porchlight
          file porchlight
          lipo -info porchlight

      - name: Package
        run: |
          ARCHIVE="porchlight-macos-universal-${{ inputs.version }}.tar.gz"
          tar -czf "$ARCHIVE" porchlight
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" "$ARCHIVE" "$ARCHIVE.sha256" --clobber --repo "${{ github.repository }}"
